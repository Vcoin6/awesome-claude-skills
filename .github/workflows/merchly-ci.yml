name: Merchly CI

# Build the web app and validate the mobile app on every change that touches them.
on:
  push:
    branches: [master]
    paths:
      - 'merchly/**'
      - 'merchly-mobile/**'
      - '.github/workflows/merchly-ci.yml'
  pull_request:
    paths:
      - 'merchly/**'
      - 'merchly-mobile/**'
      - '.github/workflows/merchly-ci.yml'

# Cancel superseded runs on the same ref.
concurrency:
  group: merchly-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: merchly
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: merchly/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # Runs in simulation mode (no secrets needed); AUTH_SECRET keeps JWT signing happy.
        run: npm run build
        env:
          AUTH_SECRET: ci-placeholder-secret

  mobile:
    name: Mobile (parse check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: merchly-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Babel (parse-only, no native toolchain)
        run: npm install --no-save @babel/core@^7 @babel/preset-react@^7

      - name: Validate sources parse
        run: node scripts/ci-parse.mjs
